<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Reservas | Hotel El Rincón del Carmen
  </title>

  <link
    rel="stylesheet"
    href="assets/css/global.css"
  >

</head>

<body>

  <!-- NAVBAR -->
  <app-navbar></app-navbar>

  <!-- RESERVAS -->
  <section class="section">

    <div class="section-title">

      <h2>
        Buscar disponibilidad
      </h2>

      <p>
        Encuentra la habitación perfecta
        para vivir una experiencia de lujo.
      </p>

    </div>

    <!-- FORMULARIO -->
    <form id="searchForm" class="reservation-form">

      <input
        type="date"
        id="checkIn"
        required
      >

      <input
        type="date"
        id="checkOut"
        required
      >

      <input
        type="number"
        id="guests"
        min="1"
        placeholder="Número de personas"
        required
      >

      <button type="submit">
        Buscar
      </button>

    </form>

    <!-- HABITACIONES -->
    <div id="availableRooms">

    </div>

  </section>

  <!-- FOOTER -->
  <app-footer></app-footer>

  <!-- COMPONENTS -->
  <script
    type="module"
    src="assets/components/navbar.js"
  ></script>

  <script
    type="module"
    src="assets/components/footer.js"
  ></script>

  <!-- APP -->
  <script
    type="module"
    src="assets/js/app.js"
  ></script>

  <script
    type="module"
    src="assets/js/reservations.js"
  ></script>

</body>
</html>
