<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Registro</title>
<link rel="stylesheet" href="assets/css/global.css" />
</head>
<body>

<section class="auth">
<h1>Registro</h1>

<form id="registerForm">
<input type="text" id="fullname" placeholder="Nombre completo" required />
<input type="text" id="id" placeholder="Identificación" required />
<input type="text" id="nationality" placeholder="Nacionalidad" required />
<input type="tel" id="phone" placeholder="Teléfono" required />
<input type="email" id="email" placeholder="Email" required />
<input type="password" id="password" placeholder="Contraseña" required />
<button>Registrar</button>
</form>
</section>

<script type="module" src="assets/js/auth.js"></script>
</body>
</html>
